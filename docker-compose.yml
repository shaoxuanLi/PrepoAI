version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: preproai-postgres
    environment:
      POSTGRES_USER: preproai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-preproai_secure_2026}
      POSTGRES_DB: preproai
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongodb:
    image: mongo:7
    container_name: preproai-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-mongo_secure_2026}
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongo_data:/data/db
    command:
      - "--auth"
      - "--bind_ip_all"

  redis:
    image: redis:7
    container_name: preproai-redis
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secure_2026} --bind 127.0.0.1
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    container_name: preproai-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_secure_2026}
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data

  etcd:
    image: quay.io/coreos/etcd:v3.5.14
    container_name: preproai-etcd
    command:
      - etcd
      - --advertise-client-urls=http://etcd:2379
      - --listen-client-urls=http://127.0.0.1:2379,http://etcd:2379
      - --data-dir=/etcd
    volumes:
      - etcd_data:/etcd

  milvus:
    image: milvusdb/milvus:v2.4.9
    container_name: preproai-milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - etcd
      - minio

  backend:
    build:
      context: ./backend
    container_name: preproai-backend
    environment:
      POSTGRES_DSN: postgresql+asyncpg://preproai:${POSTGRES_PASSWORD:-preproai_secure_2026}@postgres:5432/preproai
      MONGO_DSN: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-mongo_secure_2026}@mongodb:27017/?authSource=admin
      MONGO_DB_NAME: preproai
      REDIS_DSN: redis://:${REDIS_PASSWORD:-redis_secure_2026}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-replace-with-long-random-secret}
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      - postgres
      - mongodb
      - redis

  celery-worker:
    build:
      context: ./backend
    container_name: preproai-celery
    command: celery -A celery_worker.app worker --loglevel=info
    environment:
      POSTGRES_DSN: postgresql+asyncpg://preproai:${POSTGRES_PASSWORD:-preproai_secure_2026}@postgres:5432/preproai
      MONGO_DSN: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-mongo_secure_2026}@mongodb:27017/?authSource=admin
      MONGO_DB_NAME: preproai
      REDIS_DSN: redis://:${REDIS_PASSWORD:-redis_secure_2026}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-replace-with-long-random-secret}
    depends_on:
      - backend
      - redis

  frontend:
    build:
      context: ./frontend
    container_name: preproai-frontend
    environment:
      VITE_API_BASE: http://localhost:8000/api/v1
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
  mongo_data:
  minio_data:
  etcd_data:
  redis_data:
