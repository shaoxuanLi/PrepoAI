version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: propoai-postgres
    environment:
      POSTGRES_USER: propoai
      POSTGRES_PASSWORD: propoai
      POSTGRES_DB: propoai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongodb:
    image: mongo:7
    container_name: propoai-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7
    container_name: propoai-redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: propoai-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  etcd:
    image: quay.io/coreos/etcd:v3.5.14
    container_name: propoai-etcd
    command:
      - etcd
      - --advertise-client-urls=http://etcd:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --data-dir=/etcd
    volumes:
      - etcd_data:/etcd

  milvus:
    image: milvusdb/milvus:v2.4.9
    container_name: propoai-milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - etcd
      - minio

  backend:
    build:
      context: ./backend
    container_name: propoai-backend
    environment:
      POSTGRES_DSN: postgresql+asyncpg://propoai:propoai@postgres:5432/propoai
      MONGO_DSN: mongodb://mongodb:27017
      MONGO_DB_NAME: propoai
      REDIS_DSN: redis://redis:6379/0
      SECRET_KEY: replace-with-long-random-secret
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - mongodb
      - redis

  celery-worker:
    build:
      context: ./backend
    container_name: propoai-celery
    command: celery -A celery_worker.app worker --loglevel=info
    environment:
      POSTGRES_DSN: postgresql+asyncpg://propoai:propoai@postgres:5432/propoai
      MONGO_DSN: mongodb://mongodb:27017
      MONGO_DB_NAME: propoai
      REDIS_DSN: redis://redis:6379/0
      SECRET_KEY: replace-with-long-random-secret
    depends_on:
      - backend
      - redis

  frontend:
    build:
      context: ./frontend
    container_name: propoai-frontend
    environment:
      VITE_API_BASE: http://localhost:8000/api/v1
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
  mongo_data:
  minio_data:
  etcd_data:
