version: "3.9"

services:
  # ─────────────────── PostgreSQL ───────────────────
  db:
    image: postgres:16-alpine
    container_name: propoai_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-propoai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-propoai_pass}
      POSTGRES_DB: ${POSTGRES_DB:-propoai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-propoai}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─────────────────── Backend API ──────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: propoai_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  postgres_data:
